name: Build release packages

on:
  push:
    branches: [main, master]
    paths-ignore:
      - docs/**
      - .github/ISSUE_TEMPLATE/**
  workflow_dispatch:

permissions:
  contents: write

env:
  # Old webpack 4 needs the OpenSSL legacy provider on modern Node.
  NODE_OPTIONS: --openssl-legacy-provider

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up .NET 6
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 6.0.x

      # Pin to Node 18: GitHub currently forces some Node 20 actions onto Node 24,
      # which breaks webpack 4 digests even with openssl-legacy-provider in some cases.
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Restore dependencies
        run: |
          dotnet restore TS3AudioBot/TS3AudioBot.csproj -p:SkipGitVersion=true
          dotnet restore KuwoMusicPlugin/KuwoMusicPlugin.csproj -p:SkipGitVersion=true

      - name: Build plugin and bot
        run: |
          dotnet build TS3AudioBot/TS3AudioBot.csproj --configuration Release -p:SkipGitVersion=true --no-restore
          dotnet build KuwoMusicPlugin/KuwoMusicPlugin.csproj --configuration Release -p:SkipGitVersion=true --no-restore

      - name: Build web console
        working-directory: WebInterface
        run: |
          node -v
          npm -v
          npm ci
          npm run build
          test -s dist/index.html
          test -s dist/bundle.js
          grep -Fq "bot-select-icon" dist/bundle.js

      - name: Validate Docker Compose configuration
        run: docker compose config

      - name: Build Docker image
        run: docker build --progress=plain --tag bodian-music:ci .

      - name: Publish Linux package
        run: |
          chmod +x run/build-linux-package.sh
          ./run/build-linux-package.sh artifacts/linux/TS3AudioBot-KuwoPlugin-linux-x64
          printf 'build-%s\n' "${{ github.run_number }}" > artifacts/linux/TS3AudioBot-KuwoPlugin-linux-x64/VERSION
          rm -f artifacts/linux/TS3AudioBot-KuwoPlugin-linux-x64.tar.gz
          tar -C artifacts/linux -czf artifacts/linux/TS3AudioBot-KuwoPlugin-linux-x64.tar.gz TS3AudioBot-KuwoPlugin-linux-x64
          mkdir -p artifacts
          mv artifacts/linux/TS3AudioBot-KuwoPlugin-linux-x64.tar.gz artifacts/TS3AudioBot-KuwoPlugin-linux-x64.tar.gz

      - name: Publish Windows package
        run: |
          dotnet restore TS3AudioBot/TS3AudioBot.csproj --runtime win-x64 -p:SkipGitVersion=true
          dotnet restore KuwoMusicPlugin/KuwoMusicPlugin.csproj --runtime win-x64 -p:SkipGitVersion=true
          dotnet publish TS3AudioBot/TS3AudioBot.csproj --configuration Release --runtime win-x64 --self-contained true -p:SkipGitVersion=true --no-restore --output artifacts/windows/TS3AudioBot-KuwoPlugin-windows-x64
          mkdir -p artifacts/windows/TS3AudioBot-KuwoPlugin-windows-x64/plugins
          mkdir -p artifacts/windows/TS3AudioBot-KuwoPlugin-windows-x64/WebInterface
          cp KuwoMusicPlugin/bin/Release/net6.0/KuwoMusicPlugin.dll artifacts/windows/TS3AudioBot-KuwoPlugin-windows-x64/plugins/
          cp -a WebInterface/dist/. artifacts/windows/TS3AudioBot-KuwoPlugin-windows-x64/WebInterface/
          curl --fail --location --retry 3 --output /tmp/ffmpeg.zip https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip
          unzip -q /tmp/ffmpeg.zip -d /tmp/ffmpeg
          cp /tmp/ffmpeg/*/bin/ffmpeg.exe artifacts/windows/TS3AudioBot-KuwoPlugin-windows-x64/
          cp packaging/windows/start.bat packaging/windows/start-web-console.bat packaging/windows/README.md artifacts/windows/TS3AudioBot-KuwoPlugin-windows-x64/
          mkdir -p artifacts/windows/TS3AudioBot-KuwoPlugin-windows-x64/run
          mkdir -p artifacts/windows/TS3AudioBot-KuwoPlugin-windows-x64/packaging/common
          mkdir -p artifacts/windows/TS3AudioBot-KuwoPlugin-windows-x64/data
          cp run/start-web-console.bat run/update-windows.ps1 run/update-windows.bat run/stop-windows.bat artifacts/windows/TS3AudioBot-KuwoPlugin-windows-x64/run/
          cp run/update-windows.bat artifacts/windows/TS3AudioBot-KuwoPlugin-windows-x64/
          cp run/stop-windows.bat artifacts/windows/TS3AudioBot-KuwoPlugin-windows-x64/stop.bat
          cp packaging/common/prepare-data.ps1 packaging/common/update-in-place.ps1 artifacts/windows/TS3AudioBot-KuwoPlugin-windows-x64/packaging/common/
          printf '%s\n' "This folder stores bots, web accounts and rights. Keep it when upgrading." > artifacts/windows/TS3AudioBot-KuwoPlugin-windows-x64/data/README.txt
          printf 'build-%s\n' "${{ github.run_number }}" > artifacts/windows/TS3AudioBot-KuwoPlugin-windows-x64/VERSION
          cd artifacts/windows && zip -qr ../TS3AudioBot-KuwoPlugin-windows-x64.zip TS3AudioBot-KuwoPlugin-windows-x64

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: TS3AudioBot-KuwoPlugin-${{ github.sha }}
          path: |
            artifacts/TS3AudioBot-KuwoPlugin-linux-x64.tar.gz
            artifacts/TS3AudioBot-KuwoPlugin-windows-x64.zip
          if-no-files-found: error

      - name: Create GitHub Release
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: Automated build ${{ github.run_number }}
          prerelease: false
          generate_release_notes: true
          files: |
            artifacts/TS3AudioBot-KuwoPlugin-linux-x64.tar.gz
            artifacts/TS3AudioBot-KuwoPlugin-windows-x64.zip

      # Optional GitCode mirror. Overseas runners → CN/HK storage is often slow/stuck.
      # Never block GitHub release on this step. Prefer client "github-cn" updates instead.
      - name: Mirror release to GitCode
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        timeout-minutes: 6
        continue-on-error: true
        env:
          GITCODE_TOKEN: ${{ secrets.GITCODE_TOKEN }}
          TAG: build-${{ github.run_number }}
          OWNER_REPO: chaser114/taemspeak3-bodian
        run: |
          set -euo pipefail
          TOKEN=$(printf '%s' "${GITCODE_TOKEN:-}" | tr -d '\r\n' | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//')
          if [ -z "$TOKEN" ]; then
            echo "GITCODE_TOKEN not set; skip GitCode mirror (GitHub release is enough)."
            exit 0
          fi
          echo "Attempting GitCode mirror for ${TAG} (timeout budget ~6 min)..."
          export GITCODE_TOKEN="$TOKEN"
          export TAG OWNER_REPO
          # Fail soft: any hang is killed by step timeout-minutes; continue-on-error keeps pipeline green.
          python3 -u - <<'PY'
          import json, os, subprocess, urllib.error, urllib.parse, urllib.request, sys

          token = os.environ["GITCODE_TOKEN"]
          tag = os.environ["TAG"]
          owner_repo = os.environ["OWNER_REPO"]
          sha = os.environ.get("GITHUB_SHA", "")
          base = f"https://gitcode.com/api/v5/repos/{owner_repo}"
          ua = "taemspeak3-bodian-github-ci"
          files = [
              "artifacts/TS3AudioBot-KuwoPlugin-linux-x64.tar.gz",
              "artifacts/TS3AudioBot-KuwoPlugin-windows-x64.zip",
          ]

          def http_json(method, url, data=None):
              headers = {
                  "User-Agent": ua,
                  "Accept": "application/json",
                  "Authorization": f"Bearer {token}",
              }
              raw = None if data is None else json.dumps(data).encode("utf-8")
              if raw is not None:
                  headers["Content-Type"] = "application/json"
              req = urllib.request.Request(url, data=raw, headers=headers, method=method)
              try:
                  with urllib.request.urlopen(req, timeout=30) as resp:
                      text = resp.read().decode("utf-8", "replace")
                      return resp.status, (json.loads(text) if text else {})
              except urllib.error.HTTPError as e:
                  text = e.read().decode("utf-8", "replace")
                  try:
                      obj = json.loads(text) if text else {}
                  except Exception:
                      obj = {"raw": text}
                  return e.code, obj
              except Exception as e:
                  return 0, {"error": str(e)}

          def release_ok(tag_name):
              for url in (
                  f"{base}/releases/tags/{urllib.parse.quote(tag_name)}",
                  f"{base}/releases/{urllib.parse.quote(tag_name)}",
              ):
                  status, body = http_json("GET", url)
                  if status == 200 and isinstance(body, dict) and body.get("tag_name"):
                      return True, body
              return False, {}

          def ensure_release(tag_name):
              ok, body = release_ok(tag_name)
              if ok:
                  print(f"release exists: {tag_name}")
                  return True
              payload = {
                  "tag_name": tag_name,
                  "name": f"Automated build {tag_name}",
                  "body": f"Automated mirror of GitHub release {tag_name} ({sha}).",
                  "target_commitish": "main",
                  "prerelease": False,
              }
              print(f"create release {tag_name}")
              status, body = http_json("POST", f"{base}/releases", payload)
              print(f"create status={status} body={json.dumps(body, ensure_ascii=False)[:300]}")
              if status in (200, 201):
                  return True
              msg = json.dumps(body, ensure_ascii=False)
              if status == 409 or "already exists" in msg.lower():
                  return True
              status2, body2 = http_json("POST", f"{base}/releases?access_token={token}", payload)
              print(f"create fallback status={status2}")
              return status2 in (200, 201, 409)

          def upload(path):
              name = os.path.basename(path)
              print(f"upload {name}")
              q = urllib.parse.urlencode({"file_name": name})
              status, body = http_json("GET", f"{base}/releases/{urllib.parse.quote(tag)}/upload_url?{q}")
              print(f"upload_url status={status} {json.dumps(body, ensure_ascii=False)[:400]}")
              upload_url = None
              extra_headers = {}
              if status == 200 and isinstance(body, dict):
                  for k in ("upload_url", "url", "browser_upload_url", "href"):
                      v = body.get(k)
                      if isinstance(v, str) and v.startswith("http"):
                          upload_url = v
                          break
                  # GitCode returns signed object-storage URL + required headers.
                  # Do NOT send Authorization: Bearer to that host (causes 401).
                  hdrs = body.get("headers")
                  if isinstance(hdrs, dict):
                      for hk, hv in hdrs.items():
                          if hv is not None:
                              extra_headers[str(hk)] = str(hv)
                  elif isinstance(hdrs, list):
                      for item in hdrs:
                          if isinstance(item, dict):
                              for hk, hv in item.items():
                                  if hv is not None:
                                      extra_headers[str(hk)] = str(hv)

              if not upload_url:
                  print("no upload_url; cannot upload binary asset")
                  return False

              # Signed URL already has AccessKeyId/Signature; only send returned headers + raw body.
              cmd = [
                  "curl", "-sS", "--http1.1",
                  "--connect-timeout", "20", "--max-time", "180",
                  "-o", "/tmp/gc-up.json", "-w", "%{http_code}",
                  "-X", "PUT", upload_url,
                  "-H", f"User-Agent: {ua}",
                  "-H", "Expect:",
              ]
              if "Content-Type" not in {k.title(): v for k, v in extra_headers.items()} and "content-type" not in {k.lower(): v for k, v in extra_headers.items()}:
                  cmd.extend(["-H", "Content-Type: application/octet-stream"])
              for hk, hv in extra_headers.items():
                  cmd.extend(["-H", f"{hk}: {hv}"])
              cmd.extend(["--data-binary", f"@{path}"])

              p = subprocess.run(cmd, check=False, capture_output=True, text=True)
              code = (p.stdout or "").strip() or "000"
              print(f"  signed PUT http={code}")
              try:
                  print(open("/tmp/gc-up.json", "r", encoding="utf-8", errors="replace").read()[:400])
              except Exception:
                  pass
              if p.stderr:
                  print(f"  stderr={(p.stderr or '')[:200]}")
              if code in ("200", "201", "204"):
                  return True

              # Fallback: POST multipart without Bearer on signed URL
              cmd2 = [
                  "curl", "-sS", "--http1.1",
                  "--connect-timeout", "20", "--max-time", "180",
                  "-o", "/tmp/gc-up.json", "-w", "%{http_code}",
                  "-X", "POST", upload_url,
                  "-H", f"User-Agent: {ua}",
                  "-H", "Expect:",
                  "-F", f"file=@{path};filename={name}",
              ]
              for hk, hv in extra_headers.items():
                  # Avoid forcing Content-Type when using multipart form
                  if hk.lower() == "content-type":
                      continue
                  cmd2.extend(["-H", f"{hk}: {hv}"])
              p2 = subprocess.run(cmd2, check=False, capture_output=True, text=True)
              code2 = (p2.stdout or "").strip() or "000"
              print(f"  signed POST multipart http={code2}")
              try:
                  print(open("/tmp/gc-up.json", "r", encoding="utf-8", errors="replace").read()[:400])
              except Exception:
                  pass
              return code2 in ("200", "201", "204")

          if not ensure_release(tag):
              print("::warning::GitCode release create/find failed; skip asset upload.")
              sys.exit(0)

          ok_all = True
          for f in files:
              if not os.path.isfile(f):
                  print(f"missing {f}")
                  ok_all = False
                  continue
              if not upload(f):
                  print(f"::warning::upload failed for {f}")
                  ok_all = False
          print("GitCode mirror done" if ok_all else "GitCode mirror partial/failed (non-blocking)")
          sys.exit(0)
          PY
