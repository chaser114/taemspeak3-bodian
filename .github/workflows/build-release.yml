name: Build release packages

on:
  push:
    branches: [main, master]
    paths-ignore:
      - docs/**
      - .github/ISSUE_TEMPLATE/**
  workflow_dispatch:

permissions:
  contents: write

env:
  # Old webpack 4 needs the OpenSSL legacy provider on modern Node.
  NODE_OPTIONS: --openssl-legacy-provider

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up .NET 6
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 6.0.x

      # Pin to Node 18: GitHub currently forces some Node 20 actions onto Node 24,
      # which breaks webpack 4 digests even with openssl-legacy-provider in some cases.
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Restore dependencies
        run: |
          dotnet restore TS3AudioBot/TS3AudioBot.csproj -p:SkipGitVersion=true
          dotnet restore KuwoMusicPlugin/KuwoMusicPlugin.csproj -p:SkipGitVersion=true

      - name: Build plugin and bot
        run: |
          dotnet build TS3AudioBot/TS3AudioBot.csproj --configuration Release -p:SkipGitVersion=true --no-restore
          dotnet build KuwoMusicPlugin/KuwoMusicPlugin.csproj --configuration Release -p:SkipGitVersion=true --no-restore

      - name: Build web console
        working-directory: WebInterface
        run: |
          node -v
          npm -v
          npm ci
          npm run build
          test -s dist/index.html
          test -s dist/bundle.js
          grep -Fq "bot-select-icon" dist/bundle.js

      - name: Validate Docker Compose configuration
        run: docker compose config

      - name: Build Docker image
        run: docker build --progress=plain --tag bodian-music:ci .

      - name: Publish Linux package
        run: |
          chmod +x run/build-linux-package.sh
          ./run/build-linux-package.sh artifacts/linux/TS3AudioBot-KuwoPlugin-linux-x64
          printf 'build-%s\n' "${{ github.run_number }}" > artifacts/linux/TS3AudioBot-KuwoPlugin-linux-x64/VERSION
          rm -f artifacts/linux/TS3AudioBot-KuwoPlugin-linux-x64.tar.gz
          tar -C artifacts/linux -czf artifacts/linux/TS3AudioBot-KuwoPlugin-linux-x64.tar.gz TS3AudioBot-KuwoPlugin-linux-x64
          mkdir -p artifacts
          mv artifacts/linux/TS3AudioBot-KuwoPlugin-linux-x64.tar.gz artifacts/TS3AudioBot-KuwoPlugin-linux-x64.tar.gz

      - name: Publish Windows package
        run: |
          dotnet restore TS3AudioBot/TS3AudioBot.csproj --runtime win-x64 -p:SkipGitVersion=true
          dotnet restore KuwoMusicPlugin/KuwoMusicPlugin.csproj --runtime win-x64 -p:SkipGitVersion=true
          dotnet publish TS3AudioBot/TS3AudioBot.csproj --configuration Release --runtime win-x64 --self-contained true -p:SkipGitVersion=true --no-restore --output artifacts/windows/TS3AudioBot-KuwoPlugin-windows-x64
          mkdir -p artifacts/windows/TS3AudioBot-KuwoPlugin-windows-x64/plugins
          mkdir -p artifacts/windows/TS3AudioBot-KuwoPlugin-windows-x64/WebInterface
          cp KuwoMusicPlugin/bin/Release/net6.0/KuwoMusicPlugin.dll artifacts/windows/TS3AudioBot-KuwoPlugin-windows-x64/plugins/
          cp -a WebInterface/dist/. artifacts/windows/TS3AudioBot-KuwoPlugin-windows-x64/WebInterface/
          curl --fail --location --retry 3 --output /tmp/ffmpeg.zip https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip
          unzip -q /tmp/ffmpeg.zip -d /tmp/ffmpeg
          cp /tmp/ffmpeg/*/bin/ffmpeg.exe artifacts/windows/TS3AudioBot-KuwoPlugin-windows-x64/
          cp packaging/windows/start.bat packaging/windows/start-web-console.bat packaging/windows/README.md artifacts/windows/TS3AudioBot-KuwoPlugin-windows-x64/
          mkdir -p artifacts/windows/TS3AudioBot-KuwoPlugin-windows-x64/run
          mkdir -p artifacts/windows/TS3AudioBot-KuwoPlugin-windows-x64/packaging/common
          mkdir -p artifacts/windows/TS3AudioBot-KuwoPlugin-windows-x64/data
          cp run/start-web-console.bat run/update-windows.ps1 run/update-windows.bat run/stop-windows.bat artifacts/windows/TS3AudioBot-KuwoPlugin-windows-x64/run/
          cp run/update-windows.bat artifacts/windows/TS3AudioBot-KuwoPlugin-windows-x64/
          cp run/stop-windows.bat artifacts/windows/TS3AudioBot-KuwoPlugin-windows-x64/stop.bat
          cp packaging/common/prepare-data.ps1 packaging/common/update-in-place.ps1 artifacts/windows/TS3AudioBot-KuwoPlugin-windows-x64/packaging/common/
          printf '%s\n' "This folder stores bots, web accounts and rights. Keep it when upgrading." > artifacts/windows/TS3AudioBot-KuwoPlugin-windows-x64/data/README.txt
          printf 'build-%s\n' "${{ github.run_number }}" > artifacts/windows/TS3AudioBot-KuwoPlugin-windows-x64/VERSION
          cd artifacts/windows && zip -qr ../TS3AudioBot-KuwoPlugin-windows-x64.zip TS3AudioBot-KuwoPlugin-windows-x64

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: TS3AudioBot-KuwoPlugin-${{ github.sha }}
          path: |
            artifacts/TS3AudioBot-KuwoPlugin-linux-x64.tar.gz
            artifacts/TS3AudioBot-KuwoPlugin-windows-x64.zip
          if-no-files-found: error

      - name: Create GitHub Release
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: Automated build ${{ github.run_number }}
          prerelease: false
          generate_release_notes: true
          files: |
            artifacts/TS3AudioBot-KuwoPlugin-linux-x64.tar.gz
            artifacts/TS3AudioBot-KuwoPlugin-windows-x64.zip

      # Mirror packages to GitCode Releases so domestic "GitCode 更新" works without manual upload.
      # One-time setup: GitHub repo Settings → Secrets → Actions → GITCODE_TOKEN
      # (GitCode personal access token with repository write / release permission)
      - name: Mirror release to GitCode
        # Note: GitHub Actions forbids `secrets.*` inside `if:`; check token inside the script.
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        env:
          # Prefer repository Actions secret GITCODE_TOKEN.
          # Fallbacks help if the secret was named slightly differently.
          GITCODE_TOKEN: ${{ secrets.GITCODE_TOKEN }}
          GITCODE_TOKEN_ALT1: ${{ secrets.GITCODE_ACCESS_TOKEN }}
          GITCODE_TOKEN_ALT2: ${{ secrets.GC_TOKEN }}
          TAG: build-${{ github.run_number }}
          OWNER_REPO: chaser114/taemspeak3-bodian
        run: |
          set -euo pipefail
          # Resolve token from primary or alternate secret names (never print the value).
          TOKEN="${GITCODE_TOKEN:-}"
          TOKEN_SOURCE="GITCODE_TOKEN"
          if [ -z "$TOKEN" ] && [ -n "${GITCODE_TOKEN_ALT1:-}" ]; then
            TOKEN="$GITCODE_TOKEN_ALT1"
            TOKEN_SOURCE="GITCODE_ACCESS_TOKEN"
          fi
          if [ -z "$TOKEN" ] && [ -n "${GITCODE_TOKEN_ALT2:-}" ]; then
            TOKEN="$GITCODE_TOKEN_ALT2"
            TOKEN_SOURCE="GC_TOKEN"
          fi
          # Trim CR/LF/spaces that sometimes sneak in when pasting secrets.
          TOKEN=$(printf '%s' "$TOKEN" | tr -d '\r\n' | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//')
          export GITCODE_TOKEN="$TOKEN"

          if [ -z "$TOKEN" ]; then
            echo "::warning::No GitCode token found. Skip mirror."
            echo "Expected a GitHub Actions repository secret named GITCODE_TOKEN"
            echo "(Settings → Secrets and variables → Actions → Repository secrets)."
            echo "Do NOT put it only on GitCode; GitHub Actions cannot read GitCode settings."
            echo "After adding/updating the secret, re-run this workflow (new run required)."
            exit 0
          fi
          echo "GitCode token loaded from secret: ${TOKEN_SOURCE} (length=${#TOKEN})"
          python3 <<'PY'
          import json
          import os
          import subprocess
          import urllib.error
          import urllib.parse
          import urllib.request

          token = os.environ["GITCODE_TOKEN"]
          tag = os.environ["TAG"]
          owner_repo = os.environ["OWNER_REPO"]
          sha = os.environ.get("GITHUB_SHA", "")
          base = f"https://gitcode.com/api/v5/repos/{owner_repo}"
          ua = "taemspeak3-bodian-github-ci"
          files = [
              "artifacts/TS3AudioBot-KuwoPlugin-linux-x64.tar.gz",
              "artifacts/TS3AudioBot-KuwoPlugin-windows-x64.zip",
          ]


          def http_json(method, url, data=None, extra_headers=None):
              headers = {"User-Agent": ua, "Accept": "application/json", "Authorization": f"Bearer {token}"}
              if extra_headers:
                  headers.update(extra_headers)
              raw = None if data is None else json.dumps(data).encode("utf-8")
              if raw is not None:
                  headers["Content-Type"] = "application/json"
              req = urllib.request.Request(url, data=raw, headers=headers, method=method)
              try:
                  with urllib.request.urlopen(req, timeout=180) as resp:
                      text = resp.read().decode("utf-8", "replace")
                      return resp.status, (json.loads(text) if text else {})
              except urllib.error.HTTPError as e:
                  text = e.read().decode("utf-8", "replace")
                  try:
                      obj = json.loads(text) if text else {}
                  except Exception:
                      obj = {"raw": text}
                  return e.code, obj


          def release_exists(tag_name):
              # Official: GET /releases/tags/:tag  and  GET /releases/:tag
              for url in (
                  f"{base}/releases/tags/{urllib.parse.quote(tag_name)}",
                  f"{base}/releases/{urllib.parse.quote(tag_name)}",
                  f"{base}/releases/tags/{urllib.parse.quote(tag_name)}?access_token={token}",
              ):
                  status, body = http_json("GET", url)
                  if status == 200 and isinstance(body, dict) and (body.get("tag_name") or body.get("name")):
                      return True, body
              return False, {}


          def ensure_release(tag_name):
              exists, body = release_exists(tag_name)
              if exists:
                  print(f"Release already exists for {tag_name}")
                  return True, body

              payload = {
                  "tag_name": tag_name,
                  "name": f"Automated build {tag_name}",
                  "body": f"Automated mirror of GitHub release {tag_name} ({sha}).",
                  "target_commitish": "main",
                  "prerelease": False,
              }
              print(f"Creating GitCode release {tag_name}...")
              for url in (f"{base}/releases", f"{base}/releases?access_token={token}"):
                  status, body = http_json("POST", url, payload)
                  print(f"create status={status}")
                  print(json.dumps(body, ensure_ascii=False)[:500])
                  if status in (200, 201):
                      return True, body
                  # 409: already exists — treat as success and re-fetch
                  msg = json.dumps(body, ensure_ascii=False)
                  if status == 409 or "already exists" in msg.lower() or "已存在" in msg:
                      ok, existing = release_exists(tag_name)
                      if ok:
                          return True, existing
                      return True, body
              return False, body


          def get_upload_url(tag_name, file_name):
              q = urllib.parse.urlencode({"file_name": file_name})
              candidates = [
                  f"{base}/releases/{urllib.parse.quote(tag_name)}/upload_url?{q}",
                  f"{base}/releases/{urllib.parse.quote(tag_name)}/upload_url?{q}&access_token={token}",
                  f"{base}/releases/tags/{urllib.parse.quote(tag_name)}/upload_url?{q}",
              ]
              for url in candidates:
                  status, body = http_json("GET", url)
                  print(f"upload_url status={status} for {file_name}")
                  print(json.dumps(body, ensure_ascii=False)[:400])
                  if status != 200:
                      continue
                  if isinstance(body, str) and body.startswith("http"):
                      return body
                  if isinstance(body, dict):
                      for key in ("upload_url", "url", "browser_upload_url", "href", "uploadUrl"):
                          val = body.get(key)
                          if isinstance(val, str) and val.startswith("http"):
                              return val
                      # nested common shapes
                      for nest in ("data", "result"):
                          n = body.get(nest)
                          if isinstance(n, dict):
                              for key in ("upload_url", "url", "browser_upload_url", "href"):
                                  val = n.get(key)
                                  if isinstance(val, str) and val.startswith("http"):
                                      return val
                          if isinstance(n, str) and n.startswith("http"):
                              return n
              return None


          def upload_file(tag_name, path):
              name = os.path.basename(path)
              print(f"Uploading {name}...")
              upload_url = get_upload_url(tag_name, name)
              if upload_url:
                  print(f"Got upload_url for {name}")
                  # Prefer PUT/POST raw then multipart
                  for method in ("PUT", "POST"):
                      cmd = [
                          "curl", "-sS", "-o", "/tmp/gc-upload.json", "-w", "%{http_code}",
                          "-X", method, upload_url,
                          "-H", f"User-Agent: {ua}",
                          "-H", f"Authorization: Bearer {token}",
                          "-H", "Content-Type: application/octet-stream",
                          "--data-binary", f"@{path}",
                      ]
                      proc = subprocess.run(cmd, check=False, capture_output=True, text=True)
                      code = (proc.stdout or "").strip() or "000"
                      print(f"raw {method} {name} http={code}")
                      try:
                          print(open("/tmp/gc-upload.json", "r", encoding="utf-8", errors="replace").read()[:300])
                      except Exception:
                          pass
                      if code in ("200", "201", "204"):
                          return True

                  # multipart against upload_url
                  cmd = [
                      "curl", "-sS", "-o", "/tmp/gc-upload.json", "-w", "%{http_code}",
                      "-X", "POST", upload_url,
                      "-H", f"User-Agent: {ua}",
                      "-H", f"Authorization: Bearer {token}",
                      "-F", f"file=@{path}",
                  ]
                  proc = subprocess.run(cmd, check=False, capture_output=True, text=True)
                  code = (proc.stdout or "").strip() or "000"
                  print(f"multipart upload_url {name} http={code}")
                  try:
                      print(open("/tmp/gc-upload.json", "r", encoding="utf-8", errors="replace").read()[:300])
                  except Exception:
                      pass
                  if code in ("200", "201", "204"):
                      return True

              # Fallbacks: classic attach_files endpoints (tag-based, not numeric id)
              for url in (
                  f"{base}/releases/{urllib.parse.quote(tag_name)}/attach_files",
                  f"{base}/releases/{urllib.parse.quote(tag_name)}/attach_files?access_token={token}",
                  f"{base}/releases/tags/{urllib.parse.quote(tag_name)}/attach_files",
                  f"{base}/releases/tags/{urllib.parse.quote(tag_name)}/attach_files?access_token={token}",
              ):
                  cmd = [
                      "curl", "-sS", "-o", "/tmp/gc-upload.json", "-w", "%{http_code}",
                      "-X", "POST", url,
                      "-H", f"User-Agent: {ua}",
                      "-F", f"file=@{path}",
                  ]
                  if "access_token=" not in url:
                      cmd.extend(["-H", f"Authorization: Bearer {token}"])
                  proc = subprocess.run(cmd, check=False, capture_output=True, text=True)
                  code = (proc.stdout or "").strip() or "000"
                  print(f"attach_files {name} http={code} url={url.split('?')[0]}")
                  try:
                      print(open("/tmp/gc-upload.json", "r", encoding="utf-8", errors="replace").read()[:300])
                  except Exception:
                      pass
                  if code in ("200", "201", "204"):
                      return True
              return False


          def has_binary_assets(tag_name):
              ok, body = release_exists(tag_name)
              if not ok or not isinstance(body, dict):
                  return False
              assets = body.get("assets") or []
              for a in assets:
                  name = (a.get("name") or "").lower()
                  typ = (a.get("type") or "").lower()
                  if typ == "source":
                      continue
                  if name.endswith(".zip") or name.endswith(".tar.gz") or name.endswith(".tgz"):
                      # exclude auto source archives named like build-44.zip
                      if name in (f"{tag_name}.zip", f"{tag_name}.tar.gz", f"{tag_name}.tar.bz2", f"{tag_name}.tar"):
                          continue
                      if "windows" in name or "linux" in name or "ts3audiobot" in name or "kuwo" in name:
                          return True
              return False


          ok, body = ensure_release(tag)
          if not ok:
              print(f"::warning::Could not create/find GitCode release {tag}.")
              print(json.dumps(body, ensure_ascii=False)[:800])
              raise SystemExit(0)

          if has_binary_assets(tag):
              print(f"Binary packages already present on GitCode release {tag}; skip re-upload.")
              raise SystemExit(0)

          failed = []
          for path in files:
              if not os.path.isfile(path):
                  print(f"::warning::Missing local package {path}")
                  failed.append(path)
                  continue
              if not upload_file(tag, path):
                  failed.append(path)

          if failed:
              print(f"::warning::Some packages failed to upload: {failed}")
              print("Release may still only show source archives until upload succeeds.")
              raise SystemExit(0)

          print(f"GitCode mirror finished for {tag}.")
          if not has_binary_assets(tag):
              print("::warning::Upload calls returned success-like codes, but release assets still look like source-only.")
              print("Check GitCode Releases page for attached Win/Linux packages.")
          PY
